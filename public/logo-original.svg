<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 深色圆角背景 -->
  <rect x="4" y="4" width="504" height="504" rx="148" fill="#14141f"/>
  
  <!-- 左下圆点 -->
  <circle cx="120" cy="400" r="48" fill="white"/>
  
  <!-- 右上圆点 -->
  <circle cx="400" cy="120" r="48" fill="white"/>
  
  <!-- 曲线：从左下圆点出发，先平缓向右上弯，中段向右延伸，再向上弯到右上圆点 -->
  <path d="M120 400 
           C140 320 200 270 280 260 
           C360 250 400 200 400 110" 
        stroke="white" 
        stroke-width="36" 
        stroke-linecap="round" 
        fill="none"/>
</svg>
